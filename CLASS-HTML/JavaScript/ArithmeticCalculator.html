<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body{
            text-align: center;
            margin-top: 100px;
            font-family: Arial;
            background: linear-gradient(to right, yellow, green,blue);
        }
        input{
            padding: 8px;
            margin: 5px;
            width: 150px;
        }
        button{
            padding: 8px 15px;
            margin: 5px;
        }
        h2{
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>

    <h1>Arithmetic Calculator</h1>

    <input type="number" id="num1" placeholder="Enter First Number"><br>
    <input type="number" id="num2" placeholder="Enter Second Number"><br>

    <button onclick="add()">+</button>
    <button onclick="subtract()">-</button>
    <button onclick="multiply()">*</button>
    <button onclick="divide()">/</button>

    <h2 id="result">Result: </h2>

<script>
    function add() {
        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = parseFloat(document.getElementById("num2").value);
        let result = num1 + num2;
        document.getElementById("result").innerHTML = "Result: " + result;
    }

    function subtract() {
        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = parseFloat(document.getElementById("num2").value);
        let result = num1 - num2;
        document.getElementById("result").innerHTML = "Result: " + result;
    }

    function multiply() {
        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = parseFloat(document.getElementById("num2").value);
        let result = num1 * num2;
        document.getElementById("result").innerHTML = "Result: " + result;
    }

    function divide() {
        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = parseFloat(document.getElementById("num2").value);
        if (num2 !== 0) {
            let result = num1 / num2;
            document.getElementById("result").innerHTML = "Result: " + result;
        } else {
            document.getElementById("result").innerHTML = "Error: Division by zero";
        }
    }
</script>
</body>
</html>
