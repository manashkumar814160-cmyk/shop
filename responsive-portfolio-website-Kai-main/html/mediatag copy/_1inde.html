<!DOCTYPE html>
<head>
    <style>
        body{
            background-color: aqua;
            
        }
        h1{
            text-align:center;
            color: #333;
        }
        section{
            background: white;
            padding: 15px;
            margin: 15px auto;
            border-radius: 8px;
            box-shadow: 0 0 20px #ccc;
            text-align: center;
        }
        figure{
            text-align:center;
        }
        figcaption{
            font-style: italic;
            color: #666;
        }
    </style>
     <title>Learn Geetha Online</title>
</head>
<body>
   
    <section>
        <h2>Sri Krishna</h2>
        <figure>
            <img src="image.png" alt="Sri Krishna" width="500">
            <figcaption>Sri Krishna playing flute</figcaption>
        </figure>
    </section>

    <section>
        <h2>Audio Media</h2>
        <audio controls src="geetha.mp4" type="audio/mpeg"></audio>
           
            Your browser does not support the audio element.
    </section>



    <section>
        <h2>Video Media</h2>
        <video controls width="400" poster="krishna1.jpeg" src="krishnadance.mp4" type="video/mp4"></video>
    </section>


    <section>
        <h2>Embedded PDF (Object Tag)</h2>
        <object data="sample.pdf" type="application/pdf" width="100%" height="500">

        </object>
    </section>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/5pNLh11iTBM?si=EWe2Fl1xyMmVaCRT" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
