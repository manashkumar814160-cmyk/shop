<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="_1form.css">
        
         <title>Form Creation</title>


    </head>
    <body class="background-Box">
        <div class="formbox">
        <form>
            <h2 id="heading">STUDENT ADMISSION FORM</h2>
            <fieldset>
                <legend>Personal Details</legend>
                <label>Full Name</label><br>
                <input type="text" autofocus placeholder="Enter your full name" required><br>

                <label>Email</label><br>
                <input type="email" placeholder="Enter your email" required><br>

                <label>Password</label><br>
                <input type="password" placeholder="Enter your password" required><br>

                <label>Phone Number</label><br> 
                <input type="tel" pattern="[0-9]{10}" placeholder="Enter 10 digit number" required><br>

                <label>Date of Birth</label><br>
                <input type="date" required><br>

                <label>Age</label><br>
                <input type="number" min="1" max="100" placeholder="Enter your age" required>
            </fieldset>
            <br>
            

            <fieldset>
                <legend>Academic Details</legend>

                <label>Course</label>
                <select required>
                    <option value="">Select your course</option>
                    <option>BCA</option>
                    <option>BSc</option>
                    <option>BCom</option>
                    <option>BA</option>
                </select><br>

                <label>Branch</label>
                <input type="text" list="branches">
                <datalist id="branches">
                    <option>CSE</option>
                    <option>IT</option>
                    <option>ECE</option>
                    <option>AIDS</option>
                </datalist><br>

                <label>Percentage</label>
                <input type="range" min="20" max="90" required><br>

            </fieldset>


            
            <fieldset>
              <legend>Preference</legend>

               <label>Gender</label>
               <div>
                <input type="radio" name="gender">Male
                <input type="radio" name="gender">Female 
                </div>
               
                <label>Languages Known</label>
                <input type="checkbox">Bhojpuri
                <input type="checkbox">Hindi
                <input type="checkbox">Spanish
                <input type="checkbox">French

                <label>Upload Photo</label>
                <input type="file"><br>

                <label>Comments</label>
                <textarea rows="4" cols="50"></textarea><br><br>

                <label>Website Information</label>
                <input type="url" placeholder="Enter your website URL"><br>

            </fieldset>

            <fieldset>
                <legend>Submit Form</legend>
               <button type="submit">Submit</button>
               <button type="reset">Reset</button>  
            </fieldset>
        </form>
       </div> 
    </body>
</html>
