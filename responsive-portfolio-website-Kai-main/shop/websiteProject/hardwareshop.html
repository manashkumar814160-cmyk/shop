<!DOCTYPE html>
<html>
<head>
    <title>Manash Kumar Hardware Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        header {
            background: #222;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        nav {
            background: #ff6f00;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1581090700227-4c4f50c02c13') no-repeat center center/cover;
            height: 300px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
        }

        .section-title {
            text-align: center;
            margin: 40px 0 20px;
            font-size: 28px;
        }

        .products {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            width: 220px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            padding: 15px;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
            margin: 5px 0;
        }

        .btn {
            background: #ff6f00;
            color: white;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background: #e65c00;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        @media(max-width: 768px){
            .products{
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>MK Hardware Store</h1>
    <p>Your Trusted Hardware Partner</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Categories</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Best Quality Tools & Hardware
</div>

<h2 class="section-title">Featured Products</h2>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1586864387967-d02ef85d93e8" alt="Hammer">
        <h3>Heavy Duty Hammer</h3>
        <p class="price">₹299</p>
        <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1604908177522-402bc91f37f4" alt="Drill Machine">
        <h3>Electric Drill</h3>
        <p class="price">₹1999</p>
        <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" alt="Wrench">
        <h3>Adjustable Wrench</h3>
        <p class="price">₹499</p>
        <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1616627980657-df97b0f6d3c8" alt="PVC Pipe">
        <h3>PVC Pipe</h3>
        <p class="price">₹150</p>
        <button class="btn">Add to Cart</button>
    </div>

</div>

<footer>
    © 2026 MK Hardware Store | Contact: +91 9876543210
</footer>

</body>
</html>
