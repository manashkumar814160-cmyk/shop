<!DOCTYPE html>
<head>
    <title>
        JavaScript
    </title>
    <h1>JavaScript</h1>
</head>
    <body>
        <h1 id="heading">Welcome</h1>
        <button onclick="changetext()">Change</button>



        <script>
            console.log("Hello, World!");  
            let a=10;
            let b=20;
            let sum=a+b;
            console.log("The sum of a and b is: " + sum+" or "+(a+b));
            for(let i=0;i<5;i++){
                console.log("The value of i is: " + i);
            }
            for(let i=1;i<=2;i++){
                console.log("Hi\n");
            }

            // butttons
            function changetext(){
                document.getElementById("heading").innerHTML="Hello, JavaScript!  Welcome to javascript class";
                document.getElementById("heading").style.color="red";
            }
            
        </script>
        
    </body>
